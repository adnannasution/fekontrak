name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/refinery-contract-control
  CONTAINER_NAME: refinery-app
  PORT_MAP: "80:80"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # izin push ke GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Opsional: precheck build di host CI (gagal cepat kalau ada error)
      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install deps (host)
        run: npm ci || npm install
      - name: Test vite build (host)
        run: npm run build

      # Build Docker image (Dockerfile di root) + push ke GHCR
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH to Droplet & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:latest"

            # Login ke GHCR agar bisa pull image private
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # Tarik image terbaru
            docker pull "$IMAGE"

            # Restart container
            docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.PORT_MAP }} "$IMAGE"

            # Health check singkat
            docker ps
            sleep 2
            curl -I http://localhost || true
